# Values для apache-airflow/airflow Helm chart.
# Запускает Airflow в том же K8s кластере, подтягивает DAG'и из Git.
#
# Установка:
#   helm repo add apache-airflow https://airflow.apache.org
#   kubectl create namespace airflow
#   helm install airflow apache-airflow/airflow \
#     --namespace airflow -f helm/airflow-values.yaml \
#     --timeout 10m

executor: "KubernetesExecutor"

# DAG'и подтягиваем напрямую из Git (sync контейнер)
dags:
  gitSync:
    enabled: true
    repo: "https://github.com/<логин>/mlops-otus-hw10.git"   # ⚠️ замени
    branch: "main"
    rev: "HEAD"
    depth: 1
    subPath: "dags"
    wait: 60

# Webserver наружу
webserver:
  service:
    type: LoadBalancer
    ports:
      - name: airflow-ui
        port: 80
        targetPort: 8080
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    password: changeme123    # ⚠️ замени!
    email: admin@example.com
    firstName: admin
    lastName: user

# Postgres внутри кластера (для метаданных Airflow)
postgresql:
  enabled: true
  primary:
    persistence:
      size: 8Gi

# Redis для Celery (даже если KubernetesExecutor — chart требует включенным)
redis:
  enabled: false

# Только базовые ресурсы
scheduler:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi

triggerer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
