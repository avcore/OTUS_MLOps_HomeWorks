# PrometheusRule — критический алерт по букве задания HW10:
#   "развёрнуто 6 экземпляров модели И превышение нагрузки
#    на ЛЮБОЙ из них более 80% в течение 5 минут".
# В expr используется max(...) (а не avg) — это точная семантика "на любой".
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fraud-api-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: fraud-api
      interval: 30s
      rules:

        # Главный алерт hw10 — 6 реплик И CPU >80% хотя бы у одного pod'а 5 мин
        - alert: FraudApiSaturatedAtMaxReplicas
          expr: |
            (
              kube_deployment_status_replicas{namespace="fraud", deployment="fraud-api"} == 6
            )
            and
            (
              max(
                rate(container_cpu_usage_seconds_total{namespace="fraud", pod=~"fraud-api-.*", container="fraud-api"}[2m])
                /
                on (pod) group_left
                kube_pod_container_resource_requests{namespace="fraud", container="fraud-api", resource="cpu"}
              ) > 0.8
            )
          for: 5m
          labels:
            severity: critical
            team: mlops
          annotations:
            summary: "Fraud API на пределе: 6/6 реплик, любой pod >80% CPU 5 минут"
            description: |
              Кластер достиг максимума HPA (6 экземпляров) и хотя бы один
              pod держит CPU > 80% уже 5 минут. Возможна DDoS-атака или
              органический рост — нужно действие администратора.
            runbook_url: "https://github.com/avcore/OTUS_MLOps_HomeWorks#hw10"

        # Дополнительный — высокая нагрузка на ОДНОМ поде из 6
        - alert: FraudApiPodHighCpu
          expr: |
            (
              rate(container_cpu_usage_seconds_total{namespace="fraud", pod=~"fraud-api-.*", container="fraud-api"}[2m])
              /
              on (pod) group_left
              kube_pod_container_resource_requests{namespace="fraud", container="fraud-api", resource="cpu"}
            ) > 0.8
          for: 5m
          labels:
            severity: warning
            team: mlops
          annotations:
            summary: "Pod {{ $labels.pod }} использует > 80% CPU 5 минут"

        # Сигнал что HPA сработал и развернул 6 реплик
        - alert: FraudApiAtMaxReplicas
          expr: kube_deployment_status_replicas{namespace="fraud", deployment="fraud-api"} == 6
          for: 2m
          labels:
            severity: info
            team: mlops
          annotations:
            summary: "HPA масштабировал fraud-api до максимума (6 реплик)"
