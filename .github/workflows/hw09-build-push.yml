name: hw9 — Build and push to YCR

on:
  push:
    branches: [main]
    paths:
      - 'hw_09/**'
      - '.github/workflows/hw09-*.yml'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/hw09-test.yml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
      - name: Build and push
        env:
          REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE=cr.yandex/$REGISTRY_ID/fraud-api
          docker build -t $IMAGE:$SHA -t $IMAGE:latest hw_09
          docker push $IMAGE:$SHA
          docker push $IMAGE:latest