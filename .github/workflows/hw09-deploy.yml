name: hw9 — Deploy to K8s

on:
  workflow_run:
    workflows: ["hw9 — Build and push to YCR"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i $HOME/yandex-cloud -n
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
      - env:
          YC_SA_JSON: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        run: |
          echo "$YC_SA_JSON" > /tmp/sa.json
          yc config profile create gh-actions
          yc config set service-account-key /tmp/sa.json
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
      - run: yc managed-kubernetes cluster get-credentials --id ${{ secrets.YC_K8S_CLUSTER_ID }} --external --force
      - run: |
          sed -i "s|REGISTRY_ID|${{ secrets.YC_REGISTRY_ID }}|g" hw_09/k8s/deployment.yaml
          sed -i "s|fraud-api:latest|fraud-api:${{ github.sha }}|g" hw_09/k8s/deployment.yaml
          kubectl apply -f hw_09/k8s/namespace.yaml
          kubectl apply -f hw_09/k8s/deployment.yaml
          kubectl apply -f hw_09/k8s/service.yaml
          kubectl rollout status deployment/fraud-api -n fraud --timeout=180s
          kubectl -n fraud get all