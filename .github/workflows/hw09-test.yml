name: hw9 — Run tests

on:
  push:
    branches: [main]
    paths:
      - 'hw_09/**'
      - '.github/workflows/hw09-*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'hw_09/**'
  workflow_call:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hw_09
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest httpx
      - run: pytest api/tests/ -v --tb=short