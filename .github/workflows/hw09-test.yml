name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:    # позволяет переиспользовать в build-push.yml

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r hw_09/api/requirements.txt
          pip install pytest httpx

      - name: Run pytest
        run: pytest hw_09/api/tests/ -v --tb=short
